services:
  - type: web
    name: praetorius-cli-bridge
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm ci
    startCommand: node server/index.mjs
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ALLOWED_ORIGINS
        value: https://cbassuarez.github.io
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
