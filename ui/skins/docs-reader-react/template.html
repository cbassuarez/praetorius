<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Praetorius - Docs Reader</title>
</head>
<body data-theme="dark">
  <div class="dr-app" data-skin="docs-reader">
    <header class="dr-topcard" role="banner">
      <div class="dr-topcard-row">
        <button type="button" class="dr-drawer-btn" data-action="toggle-nav" aria-label="Toggle navigation" aria-expanded="false"></button>
        <div class="dr-brand">
          <div class="dr-brand-title" data-site-title>Praetorius Docs</div>
          <div class="dr-brand-subtitle" data-site-subtitle>Scores, cues, and context</div>
        </div>
        <div class="dr-context">
          <div class="dr-breadcrumbs" data-doc-breadcrumbs></div>
          <div class="dr-meta" data-doc-meta></div>
        </div>
      </div>
      <div class="dr-topcard-actions">
        <button type="button" class="dr-command-trigger" data-action="open-command" aria-label="Open command search"></button>
        <button id="wc-theme-toggle" class="dr-theme-toggle" type="button" role="switch" aria-checked="false" aria-label="Toggle theme" title="Toggle theme"></button>
        <button type="button" class="dr-drawer-btn" data-action="toggle-right" aria-label="Toggle tools" aria-expanded="false"></button>
      </div>
    </header>

    <div class="dr-shell">
      <aside id="dr-nav" class="dr-pane dr-nav" aria-label="Documentation navigation"></aside>

      <main id="dr-main" class="dr-pane dr-main" role="main">
        <article class="dr-article"></article>
      </main>

      <aside id="dr-right" class="dr-pane dr-right" aria-label="Page tools">
        <section class="dr-right-section dr-outline-section">
          <h2>On This Page</h2>
          <div id="dr-outline"></div>
        </section>

        <section class="dr-right-section dr-score-section" id="dr-score-tools">
          <div class="dr-score-section-head">
            <h2>Score Tools</h2>
            <button type="button" class="dr-quiet-btn" data-action="close-score" hidden>Close</button>
          </div>
          <div class="dr-score-empty" data-score-empty>No score selected yet. Open one from a score module.</div>
          <div class="dr-score-pane" data-score-pane hidden>
            <div class="dr-score-pane-head">
              <strong data-score-title>Score</strong>
              <a data-score-open class="dr-score-open" target="_blank" rel="noopener noreferrer">New tab</a>
            </div>
            <iframe data-score-frame title="Score preview" loading="lazy"></iframe>
          </div>
        </section>

        <section class="dr-right-section dr-quick-section">
          <h2>Quick Actions</h2>
          <div class="dr-quick-actions">
            <button type="button" class="dr-quick-btn" data-action="copy-page-link">Copy page link</button>
            <button type="button" class="dr-quick-btn" data-action="open-page-tab">Open page in new tab</button>
            <button type="button" class="dr-quick-btn" data-action="scroll-top">Back to top</button>
          </div>
        </section>
      </aside>
    </div>

    <div class="dr-drawer-overlay" data-action="close-drawers" aria-hidden="true"></div>

    <section id="works-console" hidden aria-hidden="true"></section>

    <div id="dr-command-palette" class="dr-command" hidden>
      <div class="dr-command-backdrop" data-action="close-command" aria-hidden="true"></div>
      <div class="dr-command-card" role="dialog" aria-modal="true" aria-label="Search documentation">
        <div class="dr-command-head">
          <label class="sr-only" for="dr-command-input">Search docs</label>
          <input id="dr-command-input" type="search" autocomplete="off" spellcheck="false" placeholder="Search docs, headings, modules"/>
          <button type="button" class="dr-command-close" data-action="close-command" aria-label="Close search"></button>
        </div>
        <div id="dr-command-results" class="dr-command-results" role="listbox" aria-label="Search results"></div>
        <div class="dr-command-foot">Use <kbd>↑</kbd>/<kbd>↓</kbd> to navigate, <kbd>Enter</kbd> to open, <kbd>Esc</kbd> to close.</div>
      </div>
    </div>

    <footer id="prae-footer" class="dr-footer" role="contentinfo"></footer>
  </div>
</body>
</html>
