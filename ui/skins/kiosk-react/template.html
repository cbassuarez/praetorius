<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Praetorius - Kiosk Touch Wall</title>
</head>
<body class="prae-theme-dark" data-theme="dark" data-prae-banner>
  <main class="kiosk-shell" role="main">
    <section class="kiosk-stage" aria-label="Kiosk stage">
      <div class="kiosk-stage-head" role="banner">
        <div class="kiosk-stage-head-left">
          <div class="kiosk-brand">
            <span class="kiosk-title" data-site-title>Praetorius</span>
            <span class="kiosk-subtitle" data-site-subtitle>Touch Wall Mode</span>
          </div>
          <nav id="prae-nav" class="kiosk-nav" aria-label="Site"></nav>
        </div>
        <button id="wc-theme-toggle" class="kiosk-theme-toggle" type="button" role="switch" aria-checked="false" aria-label="Toggle theme" title="Toggle theme"></button>
      </div>
      <div class="kiosk-stage-copy">
        <p class="kiosk-stage-kicker">Kiosk 2026</p>
        <h1 class="kiosk-stage-title">Touch Wall</h1>
        <p class="kiosk-stage-sub">Tap any tile to open details, cues, and synchronized score playback.</p>
        <div id="kiosk-mode-chip" class="kiosk-mode-chip" aria-live="polite"></div>
      </div>
    </section>

    <section class="kiosk-transport-card" aria-label="Now playing transport">
      <div id="kiosk-hud-slot" class="kiosk-hud-slot"></div>
    </section>

    <section id="kiosk-grid" class="kiosk-grid" aria-label="Works grid"></section>
    <aside id="kiosk-ctl" class="kiosk-controls" aria-label="Kiosk controls"></aside>

    <section id="kiosk-detail" class="kiosk-detail" aria-label="Work detail" hidden></section>
    <section id="works-console" hidden></section>

    <button id="kiosk-operator-hotspot" class="kiosk-operator-hotspot" type="button" aria-label="Open operator menu" title="Operator menu"></button>
    <aside id="kiosk-operator" class="kiosk-operator" aria-hidden="true" hidden role="dialog" aria-modal="false" aria-label="Operator menu">
      <header class="kiosk-operator-head">
        <h2>Operator Menu</h2>
        <button type="button" class="kiosk-operator-close" data-operator-close aria-label="Close operator menu"></button>
      </header>
      <div class="kiosk-operator-body" id="kiosk-operator-body"></div>
    </aside>

    <div class="kiosk-backdrop" data-pdf-backdrop hidden></div>
    <aside class="kiosk-pdfpane vb-pdfpane" aria-label="Score PDF" aria-hidden="true" role="dialog" aria-modal="true" hidden>
      <header class="kiosk-pdfbar">
        <div class="kiosk-pdf-title vb-pdf-title" aria-live="polite"></div>
        <button type="button" class="kiosk-pdf-close vb-pdf-close" aria-label="Close PDF"></button>
      </header>
      <iframe class="kiosk-pdf-frame vb-pdf-frame" title="Score PDF" loading="lazy" allow="autoplay; fullscreen" referrerpolicy="no-referrer"></iframe>
    </aside>
  </main>

  <footer id="prae-footer" class="kiosk-footer" role="contentinfo"></footer>
</body>
</html>
